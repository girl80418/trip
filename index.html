<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅之手札</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f4f2ec',      // 米白背景
                            active: '#4a5d54',  // 墨綠色 (Active Tab)
                            text: '#2c3631',    // 深色文字
                            blue: '#4facfe',    // 交通 Icon 藍色
                            purple: '#a18cd1',  // 住宿 Icon 紫色
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.brand.bg');
            color: theme('colors.brand.text');
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide scrollbar for horizontal scroll areas */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Timeline Line */
        .timeline-line {
            position: absolute;
            left: 1.15rem; /* Center of the icon */
            top: 2.5rem;
            bottom: -1rem;
            width: 2px;
            background-color: #e5e7eb; /* tailwind gray-200 */
            z-index: 0;
        }
        
        /* Remove line for the last item to keep it clean */
        .timeline-item:last-child .timeline-line {
            display: none;
        }

        /* Marker Icons */
        .timeline-marker {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            color: white;
            font-size: 1rem;
            box-shadow: 0 0 0 4px #ffffff;
        }

        .marker-blue { background-color: #4eb5f1; }
        .marker-purple { background-color: #a855f7; }
        .marker-green { background-color: #10b981; }
        .marker-default { background-color: #9ca3af; }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Loading spinner */
        .loader {
            border-top-color: #4a5d54;
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-brand-bg sticky top-0 z-30 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="bg-[#d96652] text-white w-6 h-6 rounded-full flex items-center justify-center text-xs shadow-sm">
                <i class="fa-solid fa-location-arrow -rotate-45"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wide text-brand-text">旅之手札</h1>
            <span class="text-xs text-gray-500 ml-2 hidden sm:inline-block">雲端即時同步</span>
            <span id="sync-indicator" class="relative flex h-2 w-2 ml-1">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
        </div>
        <div>
            <button class="bg-white hover:bg-gray-50 text-gray-600 text-sm py-1.5 px-3 rounded-full border border-gray-200 shadow-sm flex items-center transition-colors">
                <i class="fa-solid fa-lock text-xs mr-1.5"></i>
                <span id="last-updated">載入中...</span>
            </button>
        </div>
    </header>

    <main class="flex-grow w-full max-w-2xl mx-auto pb-20">
        
        <!-- View 1: 行程表 (預設顯示) -->
        <div id="view-itinerary">
            
            <!-- Loading State -->
            <div id="loading-container" class="flex flex-col items-center justify-center py-20">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-4"></div>
                <p class="text-gray-500 font-medium">載入行程中...</p>
            </div>

            <!-- Error Message -->
            <div id="error-container" class="hidden m-4 bg-red-50 border border-red-200 p-4 rounded-xl shadow-sm">
                <div>
                    <h3 class="text-sm font-medium text-red-800">資料同步失敗</h3>
                    <div class="mt-1 text-sm text-red-700" id="error-message">
                        請確認您的 Google Sheet 共用設定已設為「知道連結的任何人」都可以查看。
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden text-center py-20 px-4">
                <div class="bg-white rounded-3xl p-8 shadow-sm">
                    <i class="fa-solid fa-plane-slash text-4xl text-gray-300 mb-3"></i>
                    <h3 class="text-gray-900 font-medium">尚無行程資料</h3>
                    <p class="mt-1 text-sm text-gray-500">請確認您的 Google Sheet 中有資料且格式正確。</p>
                </div>
            </div>

            <!-- Main Itinerary Content -->
            <div id="app-content" class="hidden">
                <!-- Date Tabs -->
                <div class="px-2 pt-4 pb-2">
                    <div id="tabs-container" class="flex space-x-2 overflow-x-auto hide-scrollbar px-2 snap-x">
                        <!-- Tabs will be injected here -->
                    </div>
                </div>

                <!-- Daily Itinerary Card -->
                <div class="px-4 mt-2 mb-6 fade-in">
                    <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-6 min-h-[50vh]">
                        
                        <!-- Day Header -->
                        <div class="mb-8">
                            <h2 id="day-title" class="text-2xl font-bold text-gray-900 mb-1"></h2>
                            <p id="day-subtitle" class="text-sm text-gray-500"></p>
                        </div>

                        <!-- Timeline -->
                        <div id="timeline-container" class="relative">
                            <!-- Timeline items will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- View 2: 旅遊手札 -->
        <div id="view-notes" class="hidden px-4 mt-4 fade-in h-full">
            <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-6 min-h-[65vh] flex flex-col">
                <div class="flex items-center mb-4">
                    <div class="bg-[#f0ece1] text-[#b39b7d] w-8 h-8 rounded-full flex items-center justify-center mr-3">
                        <i class="fa-solid fa-book-open text-sm"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-900">旅遊手札</h2>
                </div>
                <p class="text-sm text-gray-500 mb-4">記錄旅途中的心情點滴 (自動儲存於瀏覽器)</p>
                <textarea id="notes-textarea" class="flex-1 w-full p-4 bg-[#faf9f7] border border-gray-100 rounded-2xl focus:outline-none focus:border-brand-active focus:ring-1 focus:ring-brand-active resize-none text-gray-700 leading-relaxed shadow-inner" placeholder="今天發生了什麼趣事呢...？"></textarea>
            </div>
        </div>

        <!-- View 3: 記帳 -->
        <div id="view-expenses" class="hidden px-4 mt-4 fade-in">
            <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-6 min-h-[65vh]">
                <div class="flex items-center mb-4">
                    <div class="bg-[#eaf1f1] text-[#699a93] w-8 h-8 rounded-full flex items-center justify-center mr-3">
                        <i class="fa-solid fa-wallet text-sm"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-900">支出記帳</h2>
                </div>
                
                <div class="bg-brand-bg rounded-2xl p-5 mb-6 flex justify-between items-center shadow-inner border border-gray-100/50">
                    <span class="text-gray-600 font-medium">總計花費</span>
                    <span class="text-3xl font-bold text-brand-active" id="expense-total">$ 0</span>
                </div>

                <div class="flex gap-2 mb-6">
                    <input type="text" id="expense-name" placeholder="項目 (如: 拉麵)" class="flex-1 w-0 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-brand-active focus:ring-1 focus:ring-brand-active text-sm transition-colors">
                    <input type="number" id="expense-amount" placeholder="金額" class="w-24 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-brand-active focus:ring-1 focus:ring-brand-active text-sm transition-colors">
                    <button onclick="addExpense()" class="bg-brand-active text-white px-4 py-2 rounded-xl font-medium hover:bg-[#3a4942] transition-colors shadow-sm flex items-center justify-center">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>

                <div id="expense-list" class="space-y-3 overflow-y-auto max-h-[40vh] hide-scrollbar pb-4">
                    <!-- Expenses injected here -->
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation Bar (Mockup matching image style) -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 pb-safe z-40">
        <div class="max-w-2xl mx-auto flex justify-around">
            <button id="nav-itinerary" onclick="switchView('itinerary')" class="nav-btn flex flex-col items-center py-3 px-4 text-brand-active transition-colors">
                <i class="fa-solid fa-map-location-dot text-lg mb-1"></i>
                <span class="text-[10px] font-medium">行程表</span>
            </button>
            <button id="nav-notes" onclick="switchView('notes')" class="nav-btn flex flex-col items-center py-3 px-4 text-gray-400 hover:text-brand-active transition-colors">
                <i class="fa-solid fa-book-open text-lg mb-1"></i>
                <span class="text-[10px] font-medium">旅遊手札</span>
            </button>
            <button id="nav-expenses" onclick="switchView('expenses')" class="nav-btn flex flex-col items-center py-3 px-4 text-gray-400 hover:text-brand-active transition-colors">
                <i class="fa-solid fa-wallet text-lg mb-1"></i>
                <span class="text-[10px] font-medium">記帳</span>
            </button>
            <button class="flex flex-col items-center py-3 px-4 text-gray-300 cursor-not-allowed">
                <i class="fa-solid fa-gear text-lg mb-1"></i>
                <span class="text-[10px] font-medium">管理/備份</span>
            </button>
        </div>
    </nav>

    <script>
        const sheetId = '14qhma0Ey_kb_fdAxgwNiwK12O5j8kOqpbLW6rhBLId4';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
        const REFRESH_INTERVAL = 10000; // 10 秒
        
        // DOM Elements
        const appContent = document.getElementById('app-content');
        const timelineContainer = document.getElementById('timeline-container');
        const tabsContainer = document.getElementById('tabs-container');
        const loadingContainer = document.getElementById('loading-container');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const emptyState = document.getElementById('empty-state');
        const lastUpdatedEl = document.getElementById('last-updated');
        const dayTitleEl = document.getElementById('day-title');
        const daySubtitleEl = document.getElementById('day-subtitle');
        const syncIndicator = document.getElementById('sync-indicator');
        
        // App State
        let currentCsvData = null;
        let parsedGroupedData = {}; 
        let activeDateKey = null;

        /**
         * Simple CSV parser
         */
        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                // Handle commas inside double quotes
                const matches = lines[i].match(/(\\.|[^",]+|"[^"]*")+/g) || [];
                const obj = {};
                matches.forEach((val, index) => {
                    if (headers[index]) {
                        obj[headers[index]] = val.trim().replace(/^"|"$/g, '');
                    }
                });
                if (Object.keys(obj).length > 0) result.push(obj);
            }
            return result;
        }

        /**
         * Group data by distinct Days/Dates
         */
        function processData(data) {
            if (!data || data.length === 0) return {};

            const headers = Object.keys(data[0]);
            
            // Guess column roles
            const findCol = (keywords) => {
                const lower = headers.map(h => h.toLowerCase());
                for (const k of keywords) {
                    const idx = lower.findIndex(h => h.includes(k));
                    if (idx !== -1) return headers[idx];
                }
                return null;
            };

            const dateCol = findCol(['日期', 'date', 'day']);
            const timeCol = findCol(['時間', 'time']);
            const titleCol = findCol(['行程', '活動', '標題', '地點', 'title', '名稱']);
            const descCol = findCol(['描述', '備註', '內容', 'desc', 'note']);

            // Fallbacks if columns are missing
            const finalDateCol = dateCol || headers[0];
            const finalTimeCol = timeCol || (headers.length > 1 && !dateCol ? headers[1] : null);
            const finalTitleCol = titleCol || (headers.length > 2 ? headers[2] : headers[1]);
            
            let grouped = {};

            data.forEach((row, idx) => {
                let dateVal = row[finalDateCol] || `Day ${idx + 1}`;
                
                // If date cell contains time (e.g. "8/23 14:00"), extract just the date part for grouping
                let groupKey = dateVal.split(' ')[0].trim(); 
                
                // Construct time
                let timeVal = row[finalTimeCol] || '';
                // If dateVal had time inside it, extract it if timeCol wasn't found
                if (!timeVal && dateVal.includes(' ')) {
                    const parts = dateVal.split(' ');
                    timeVal = parts.slice(1).join(' ');
                }

                if (!grouped[groupKey]) {
                    grouped[groupKey] = {
                        title: `${groupKey}`,
                        subtitle: '',
                        items: []
                    };
                }

                // Identify item type for icons (simple heuristics based on title/desc)
                const titleStr = (row[finalTitleCol] || '').toLowerCase();
                let type = 'default';
                let icon = 'fa-location-dot';
                let markerClass = 'marker-default';

                if (titleStr.includes('機場') || titleStr.includes('車站') || titleStr.includes('轉車') || titleStr.includes('搭乘') || titleStr.includes('接機')) {
                    type = 'transport'; icon = 'fa-train-subway'; markerClass = 'marker-blue';
                } else if (titleStr.includes('飯店') || titleStr.includes('住宿') || titleStr.includes('hotel') || titleStr.includes('check-in')) {
                    type = 'hotel'; icon = 'fa-bed'; markerClass = 'marker-purple';
                } else if (titleStr.includes('吃') || titleStr.includes('餐') || titleStr.includes('拉麵') || titleStr.includes('燒肉')) {
                    type = 'food'; icon = 'fa-utensils'; markerClass = 'marker-green';
                }

                grouped[groupKey].items.push({
                    time: timeVal,
                    title: row[finalTitleCol] || '未命名',
                    desc: row[descCol] || '',
                    icon: icon,
                    markerClass: markerClass
                });
            });

            return grouped;
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            const keys = Object.keys(parsedGroupedData);
            
            keys.forEach(key => {
                const btn = document.createElement('button');
                const isActive = key === activeDateKey;
                
                btn.className = `flex-shrink-0 px-5 py-2 text-sm font-medium rounded-[1.2rem] transition-all duration-200 border 
                    ${isActive 
                        ? 'bg-brand-active text-white border-brand-active shadow-md' 
                        : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`;
                
                btn.textContent = key;
                btn.onclick = () => {
                    activeDateKey = key;
                    renderTabs(); // Update active state
                    renderDayContent(); // Update content below
                    
                    // Center the clicked tab slightly
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                };
                
                tabsContainer.appendChild(btn);
            });
        }

        function renderDayContent() {
            const dayData = parsedGroupedData[activeDateKey];
            if (!dayData) return;

            // Update Header
            // Using a generic format for demo since we don't know exactly how the CSV text is formatted.
            dayTitleEl.textContent = dayData.title;
            // You can extract a subtitle if available, hiding it if not
            daySubtitleEl.textContent = dayData.subtitle;
            daySubtitleEl.style.display = dayData.subtitle ? 'block' : 'none';

            // Clear Timeline
            timelineContainer.innerHTML = '';

            if (dayData.items.length === 0) {
                timelineContainer.innerHTML = '<div class="text-center text-gray-400 py-10">今日無行程</div>';
                return;
            }

            dayData.items.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'timeline-item relative flex gap-4 mb-6 fade-in';
                itemEl.style.animationDelay = `${index * 0.05}s`;

                itemEl.innerHTML = `
                    <!-- Vertical Line -->
                    <div class="timeline-line"></div>
                    
                    <!-- Icon Marker -->
                    <div class="timeline-marker ${item.markerClass}">
                        <i class="fa-solid ${item.icon} text-xs"></i>
                    </div>

                    <!-- Card Content -->
                    <div class="flex-1 bg-white border border-gray-100 rounded-2xl p-4 shadow-sm relative hover:shadow-md transition-shadow">
                        ${item.time ? `<div class="text-[0.85rem] font-bold text-brand-active mb-1 font-mono">${item.time}</div>` : ''}
                        <h3 class="text-lg font-bold text-gray-900 mb-1 leading-snug">${item.title}</h3>
                        ${item.desc ? `<p class="text-gray-500 text-sm leading-relaxed whitespace-pre-wrap">${item.desc}</p>` : ''}
                        
                        <!-- Map Button (Optional / Mockup logic) -->
                        ${item.title.length > 0 ? `
                        <div class="mt-3">
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.title)}" target="_blank" 
                               class="inline-flex items-center px-3 py-1 bg-gray-50 text-gray-600 text-xs font-medium rounded-lg border border-gray-200 hover:bg-gray-100">
                                <i class="fa-solid fa-map text-[#6b7280] mr-1.5"></i> Google 地圖
                            </a>
                        </div>
                        ` : ''}
                    </div>
                `;
                timelineContainer.appendChild(itemEl);
            });
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(`${csvUrl}&_t=${new Date().getTime()}`);
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const csvText = await response.text();
                
                if (csvText.trim().startsWith('<!DOCTYPE html>')) {
                    throw new Error('Access denied. Check sharing settings.');
                }

                // If data changed or first load
                if (csvText !== currentCsvData) {
                    currentCsvData = csvText;
                    
                    parsedGroupedData = processData(parseCSV(csvText));
                    const keys = Object.keys(parsedGroupedData);
                    
                    if (keys.length === 0) {
                        appContent.classList.add('hidden');
                        emptyState.classList.remove('hidden');
                    } else {
                        emptyState.classList.add('hidden');
                        appContent.classList.remove('hidden');
                        
                        // Set active date if not set, or if it doesn't exist anymore
                        if (!activeDateKey || !keys.includes(activeDateKey)) {
                            activeDateKey = keys[0];
                        }
                        
                        renderTabs();
                        renderDayContent();
                    }
                    
                    loadingContainer.classList.add('hidden');
                    errorContainer.classList.add('hidden');
                }

                // Update UI indicator
                const now = new Date();
                lastUpdatedEl.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} 同步`;
                
                // Flash sync indicator
                syncIndicator.classList.remove('hidden');
                setTimeout(() => syncIndicator.classList.add('hidden'), 2000);

            } catch (error) {
                console.error("Fetch error:", error);
                
                if (currentCsvData === null) {
                    loadingContainer.classList.add('hidden');
                    appContent.classList.add('hidden');
                    errorContainer.classList.remove('hidden');
                    
                    if (error.message.includes('Access denied')) {
                        errorMessage.textContent = '存取被拒絕。請確保 Google 試算表的共用設定為「知道連結的任何人」都可以查看。';
                    }
                }
                lastUpdatedEl.textContent = "連線中斷";
            }
        }

        // Init
        fetchSheetData();
        setInterval(fetchSheetData, REFRESH_INTERVAL);

        // --- 底部導覽列切換邏輯 ---
        function switchView(viewName) {
            // 隱藏所有 View
            document.getElementById('view-itinerary').classList.add('hidden');
            document.getElementById('view-notes').classList.add('hidden');
            document.getElementById('view-expenses').classList.add('hidden');
            
            // 顯示目標 View
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            
            // 更新導覽列按鈕顏色
            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns.forEach(btn => {
                btn.classList.remove('text-brand-active');
                btn.classList.add('text-gray-400');
            });
            
            const activeBtn = document.getElementById(`nav-${viewName}`);
            activeBtn.classList.remove('text-gray-400');
            activeBtn.classList.add('text-brand-active');
        }

        // --- 旅遊手札邏輯 (使用 LocalStorage 儲存) ---
        const notesTextarea = document.getElementById('notes-textarea');
        // 初始化讀取
        notesTextarea.value = localStorage.getItem('travelApp_notes') || '';
        // 自動儲存
        notesTextarea.addEventListener('input', (e) => {
            localStorage.setItem('travelApp_notes', e.target.value);
        });

        // --- 記帳邏輯 (使用 LocalStorage 儲存) ---
        let expensesList = JSON.parse(localStorage.getItem('travelApp_expenses')) || [];

        function renderExpenses() {
            const listEl = document.getElementById('expense-list');
            const totalEl = document.getElementById('expense-total');
            
            listEl.innerHTML = '';
            let total = 0;

            if (expensesList.length === 0) {
                listEl.innerHTML = '<div class="text-center text-gray-400 py-6 text-sm">目前尚無記帳紀錄</div>';
            } else {
                // 反轉陣列讓最新的一筆在最上面顯示
                [...expensesList].reverse().forEach((exp, reversedIndex) => {
                    const originalIndex = expensesList.length - 1 - reversedIndex;
                    total += parseFloat(exp.amount);
                    
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center bg-white border border-gray-100 p-3.5 rounded-2xl shadow-sm hover:border-gray-200 transition-colors fade-in';
                    item.innerHTML = `
                        <div class="font-medium text-gray-800">${exp.name}</div>
                        <div class="flex items-center gap-4">
                            <div class="text-brand-text font-bold">$${parseFloat(exp.amount).toLocaleString()}</div>
                            <button onclick="deleteExpense(${originalIndex})" class="text-gray-300 hover:text-red-400 transition-colors p-1" title="刪除">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            }

            // 更新總計數字，並加上千分位符號
            totalEl.textContent = `$ ${total.toLocaleString()}`;
        }

        function addExpense() {
            const nameInput = document.getElementById('expense-name');
            const amountInput = document.getElementById('expense-amount');
            
            const name = nameInput.value.trim();
            const amount = parseFloat(amountInput.value);
            
            // 驗證輸入
            if (name && !isNaN(amount) && amount > 0) {
                expensesList.push({ name, amount });
                localStorage.setItem('travelApp_expenses', JSON.stringify(expensesList));
                renderExpenses();
                
                // 清空輸入框並解除紅框錯誤提示
                nameInput.value = '';
                amountInput.value = '';
                nameInput.classList.remove('border-red-400');
                amountInput.classList.remove('border-red-400');
            } else {
                // 簡易錯誤提示 (加上紅色邊框)
                if (!name) nameInput.classList.add('border-red-400');
                else nameInput.classList.remove('border-red-400');
                
                if (isNaN(amount) || amount <= 0) amountInput.classList.add('border-red-400');
                else amountInput.classList.remove('border-red-400');
            }
        }

        function deleteExpense(index) {
            // 建立自訂的防呆刪除確認彈窗（不使用原生的 confirm，維持美觀）
            const msgBox = document.createElement('div');
            msgBox.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm fade-in px-4';
            msgBox.innerHTML = `
                <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-xl">
                    <h3 class="text-lg font-bold text-gray-900 mb-2">確認刪除</h3>
                    <p class="text-gray-500 mb-6 text-sm">確定要刪除這筆「${expensesList[index].name}」的記帳紀錄嗎？</p>
                    <div class="flex gap-3">
                        <button id="cancel-del" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">取消</button>
                        <button id="confirm-del" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-medium hover:bg-red-600 transition-colors shadow-sm">確認刪除</button>
                    </div>
                </div>
            `;
            document.body.appendChild(msgBox);

            document.getElementById('cancel-del').onclick = () => msgBox.remove();
            document.getElementById('confirm-del').onclick = () => {
                expensesList.splice(index, 1);
                localStorage.setItem('travelApp_expenses', JSON.stringify(expensesList));
                renderExpenses();
                msgBox.remove();
            };
        }

        // 初始化記帳畫面
        renderExpenses();

    </script>
</body>
</html>
