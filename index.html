<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族旅之手札 ✈️</title>
  <style>
    :root {
      --primary-color: #4f46e5;
      --bg-color: #f3f4f6;
      --card-bg: #ffffff;
      --text-color: #1f2937;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 1.5rem;
      margin-top: 0;
      color: var(--primary-color);
      text-align: center;
    }

    .status-bar {
      font-size: 0.85rem;
      text-align: center;
      padding: 6px 12px;
      border-radius: 20px;
      background-color: #e5e7eb;
      margin-bottom: 20px;
      color: #4b5563;
    }

    .status-bar.online {
      background-color: #d1fae5;
      color: #065f46;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--primary-color);
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #4338ca;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .delete-btn {
      background-color: #ef4444;
      padding: 6px 12px;
      font-size: 0.85rem;
      margin-left: 10px;
    }

    .delete-btn:hover {
      background-color: #dc2626;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>✈️ 家族旅之手札</h1>
    <div id="status" class="status-bar">連線中...</div>

    <form id="schedule-form" class="input-group">
      <input type="text" id="schedule-input" placeholder="輸入新行程（例如：10:00 抵達東京車站）" required>
      <button type="submit">新增</button>
    </form>

    <ul id="schedule-list"></ul>
  </div>

  <!-- Firebase 模組化 SDK (CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 填入你專屬的 Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyAq34fJXWQxDqk2q9QYWSUlABQSmTxOCk4",
      authDomain: "gen-lang-client-0983580961.firebaseapp.com",
      projectId: "gen-lang-client-0983580961",
      storageBucket: "gen-lang-client-0983580961.firebasestorage.app",
      messagingSenderId: "939696110041",
      appId: "1:939696110041:web:48584ca49350629daf81c8",
      measurementId: "G-P24YSNX84R"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusEl = document.getElementById("status");
    const formEl = document.getElementById("schedule-form");
    const inputEl = document.getElementById("schedule-input");
    const listEl = document.getElementById("schedule-list");

    // 1. 自動進行匿名身份驗證（滿足 Security Rules 要求）
    signInAnonymously(auth).catch((error) => {
      console.error("匿名認證失敗:", error);
      statusEl.textContent = "❌ 認證失敗，請檢查 Security Rules 設定";
      statusEl.style.backgroundColor = "#fde8e8";
    });

    // 2. 監聽認證狀態，成功後開啟即時資料庫監聽
    onAuthStateChanged(auth, (user) => {
      if (user) {
        statusEl.textContent = "🟢 即時同步連線中";
        statusEl.classList.add("online");

        // 啟動 Cloud Firestore 即時動態監聽
        listenToSchedules();
      }
    });

    // 3. 即時資料監聽 (onSnapshot)
    function listenToSchedules() {
      const q = query(collection(db, "schedules"), orderBy("createdAt", "asc"));

      onSnapshot(q, (snapshot) => {
        listEl.innerHTML = "";

        snapshot.forEach((docSnapshot) => {
          const data = docSnapshot.data();
          const li = document.createElement("li");

          const textSpan = document.createElement("span");
          textSpan.textContent = data.text;

          const delBtn = document.createElement("button");
          delBtn.textContent = "刪除";
          delBtn.className = "delete-btn";
          delBtn.onclick = () => deleteSchedule(docSnapshot.id);

          li.appendChild(textSpan);
          li.appendChild(delBtn);
          listEl.appendChild(li);
        });
      }, (error) => {
        console.error("即時監聽失敗:", error);
      });
    }

    // 4. 新增行程至 Firestore
    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;

      try {
        await addDoc(collection(db, "schedules"), {
          text: text,
          createdAt: serverTimestamp()
        });
        inputEl.value = "";
      } catch (error) {
        console.error("新增行程失敗:", error);
        alert("新增失敗！請確認 Firestore 的安全規則 (Rules) 已設定為允許讀寫。");
      }
    });

    // 5. 刪除行程
    async function deleteSchedule(id) {
      try {
        await deleteDoc(doc(docRef = db, "schedules", id));
      } catch (error) {
        console.error("刪除行程失敗:", error);
      }
    }
  </script>
</body>
</html>
